run:
  timeout: 5m
  go: "1.23"
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
linters-settings:
  revive:
    severity: warning
  goimports:
    local-prefixes: github.com/foresight-engine/agent-collector
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
